<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#2A1208" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
  <title>River ford</title>
  <!-- upper wavy water line -->
  <path d="M8 35 Q18 29 28 35 Q38 41 48 35 Q58 29 68 35 Q78 41 88 35" fill="none"/>
  <!-- lower wavy water line -->
  <path d="M8 65 Q18 59 28 65 Q38 71 48 65 Q58 59 68 65 Q78 71 88 65" fill="none"/>
  <!-- stepping stones at center y=50 (this IS the geographic anchor point) -->
  <ellipse cx="28" cy="50" rx="6" ry="4" fill="#C4903A" stroke-width="1.5"/>
  <ellipse cx="50" cy="50" rx="7" ry="4.5" fill="#C4903A" stroke-width="1.5"/>
  <ellipse cx="72" cy="50" rx="6" ry="4" fill="#C4903A" stroke-width="1.5"/>
  <!-- secondary current ripples -->
  <path d="M14 43 Q18 41 22 43" stroke="#5b3a14" stroke-width="1.2" fill="none"/>
  <path d="M78 57 Q82 55 86 57" stroke="#5b3a14" stroke-width="1.2" fill="none"/>
</svg>
