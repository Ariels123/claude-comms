<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="#2A1208" stroke-width="2" stroke-linejoin="round" stroke-linecap="round">
  <title>Trade goods</title>
  <!-- main bale (rounded-top trapezoid) -->
  <path d="M26 95 L22 55 Q22 45 50 42 Q78 45 78 55 L74 95 Z" fill="#C4903A"/>
  <!-- upper rope tie -->
  <path d="M26 70 Q50 66 74 70" stroke="#5b3a14" stroke-width="2" fill="none"/>
  <!-- lower rope tie -->
  <path d="M26 85 Q50 81 74 85" stroke="#5b3a14" stroke-width="2" fill="none"/>
  <!-- vertical rope -->
  <line x1="50" y1="44" x2="50" y2="95" stroke="#5b3a14" stroke-width="2"/>
  <!-- knot at top -->
  <circle cx="50" cy="44" r="3" fill="#C4903A" stroke-width="1.5"/>
  <!-- ground -->
  <line x1="18" y1="95" x2="82" y2="95" stroke-width="2.6"/>
</svg>
