  <path d="M32 95 L32 35 L39 35 L39 29 L46 29 L46 35 L54 35 L54 28 L61 28 L61 35 L68 35 L68 95 Z" fill="#C4903A"/>
  <!-- conical cap -->
  <path d="M38 28 L50 13 L62 28 Z" fill="#C4903A"/>
